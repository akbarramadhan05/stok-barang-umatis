<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pengaturan — Stokbar Umatis</title>
  <link rel="stylesheet" href="css/variables.css" />
  <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="css/components.css" />
</head>
<body>
  <div class="app-layout">
    <aside class="sidebar" id="sidebar"></aside>
    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <main class="main-content">
      <header class="top-header">
        <div class="header-left">
          <button type="button" class="menu-toggle" id="menuToggle" aria-label="Menu">☰</button>
          <h1 id="pageTitle">Pengaturan</h1>
        </div>
      </header>

      <div class="page-content">
        <div class="card" style="max-width:560px">
          <div class="card-header"><h2>Pengaturan Aplikasi</h2></div>
          <div class="card-body">
            <form id="settingsForm">
              <div class="form-group">
                <label class="form-label" for="cafeName">Nama Kafe / Outlet</label>
                <input class="form-input" id="cafeName" />
              </div>
              <div class="form-group">
                <label class="form-label">
                  <input type="checkbox" id="lowStockNotify" style="width:auto;margin-right:0.5rem" />
                  Aktifkan notifikasi stok menipis di dashboard
                </label>
              </div>
              <div class="form-actions">
                <button type="submit" class="btn btn-primary">Simpan Pengaturan</button>
              </div>
            </form>
          </div>
        </div>

        <div class="card" style="max-width:560px;margin-top:1.25rem">
          <div class="card-header"><h2>Data Demo</h2></div>
          <div class="card-body">
            <p style="font-size:0.875rem;color:var(--color-text-secondary);margin-bottom:1rem">
              Reset semua data ke kondisi awal (inventory, transaksi, supplier sample).
            </p>
            <button type="button" class="btn btn-danger" id="btnReset">Reset Data ke Default</button>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script src="js/api-client.js"></script>
  <script src="js/data.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/app.js"></script>
  <script>
    (async () => {
    const session = initLayout("settings.html", "Pengaturan");
    if (!session) return;

    let settings = { cafeName: "Stokbar Umatis", lowStockNotify: true, currency: "IDR" };
    if (USE_API) {
      try { settings = await refreshSettings(); } catch (e) { showDataError(e); }
    } else {
      settings = getJSON(STORAGE_KEYS.settings, settings);
    }
    document.getElementById("cafeName").value = settings.cafeName || "Stokbar Umatis";
    document.getElementById("lowStockNotify").checked = settings.lowStockNotify !== false;

    document.getElementById("settingsForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      try {
        await saveSettings({
          cafeName: document.getElementById("cafeName").value.trim(),
          lowStockNotify: document.getElementById("lowStockNotify").checked,
          currency: "IDR",
        });
        showToast("Pengaturan disimpan");
      } catch (err) { showToast(err.message, "error"); }
    });

    document.getElementById("btnReset").addEventListener("click", () => {
      showToast("Reset data: hapus & import ulang database/schema.sql di phpMyAdmin.", "error");
    });
    })();
  </script>
</body>
</html>
